openapi: 3.0.3
info:
  title: PsychPaper API
  version: 0.1.0
servers:
  - url: /api
    description: Local API base path

paths:
  /admin/login:
    post:
      tags:
        - Admin Auth
      summary: Login admin with session cookie
      description: Validate admin credentials and create a server-side session (`pp_session` HttpOnly cookie).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLogin'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLoginFailure'

  /admin/logout:
    post:
      tags:
        - Admin Auth
      summary: Logout admin session
      security:
        - sessionCookieAuth: []
      responses:
        '204':
          description: Logout success
        '401':
          description: No valid admin session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/me:
    get:
      tags:
        - Admin Auth
      summary: Get current authenticated admin
      security:
        - sessionCookieAuth: []
      responses:
        '200':
          description: Current authenticated admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMeResponse'
        '401':
          description: No valid admin session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/users:
    get:
      tags:
        - Admin Users
      summary: List admin users
      description: Return all admin users. MVP에서는 페이지네이션 없이 전체 목록을 반환한다.
      security:
        - sessionCookieAuth: []
      responses:
        '200':
          description: List of admin users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminUser'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: No valid admin session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/users/{id}:
    get:
      tags:
        - Admin Users
      summary: Get a single admin user
      security:
        - sessionCookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Admin user found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
        '404':
          description: Admin user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: No valid admin session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Admin Users
      summary: Update an admin user
      security:
        - sessionCookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpdate'
      responses:
        '200':
          description: Updated admin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Admin user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: No valid admin session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Admin Users
      summary: Delete an admin user
      security:
        - sessionCookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Admin user deleted
        '404':
          description: Admin user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: No valid admin session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/users:
    post:
      tags:
        - Admin Users
      summary: Create a new admin user
      security:
        - sessionCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserCreate'
      responses:
        '201':
          description: Admin user created
          headers:
            Location:
              description: URL of the created admin user resource
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: No valid admin session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    sessionCookieAuth:
      type: apiKey
      in: cookie
      name: pp_session

  schemas:
    AdminLogin:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    AdminLoginResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
          example: true

    AdminLoginFailure:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
          example: false

    AdminMeResponse:
      type: object
      required:
        - user
      properties:
        user:
          type: object
          required:
            - id
            - username
          properties:
            id:
              type: integer
              format: int32
            username:
              type: string

    AdminUser:
      type: object
      required:
        - id
        - username
        - created_at
      properties:
        id:
          type: integer
          format: int32
        username:
          type: string
          minLength: 3
          maxLength: 50
        created_at:
          type: string
          format: date-time

    AdminUserCreate:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 72

    AdminUserUpdate:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 72

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string

