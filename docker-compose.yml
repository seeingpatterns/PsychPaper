# web + server + DB. 브라우저에서 http://localhost:8080 으로 PsychPaper 접속
services:
  server:
    build: ./server
    ports:
      - "3000:3000"
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env.docker
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-schema/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
